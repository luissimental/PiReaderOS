version: 1
disable_existing_loggers: False

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] (%(caller)s)->(%(filename)s:%(lineno)d) %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S%z"

filters:
  caller_filter:
    (): pireaderos.core.logging.CallerFilter

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    filters: ["caller_filter"]
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/system.log
    maxBytes: 1000000 # 1MB
    backupCount: 3

loggers:
  "": # root
    level: DEBUG
    handlers: ["console", "file"]
    propagate: True
